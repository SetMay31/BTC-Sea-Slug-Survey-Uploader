<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1f5a4a" />
  <title>Sea Slug Survey — Data Uploader</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="app-icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="app-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-row">
      <img class="brand-mark" src="logo.png" alt="Black Turtle Conservation"
           onerror="if(!this.dataset.t){this.dataset.t='1';this.src='logo.svg'}else{this.onerror=null;this.src='icon.svg'}" />
      <div class="brand-text">
        <span class="brand-line-1">Black Turtle Conservation</span>
        <span class="brand-line-2">Sea Slug Survey Uploader</span>
      </div>
      <div class="topbar-status">
        <span id="net-status" class="net-dot" title="Online status"></span>
        <span id="queue-count" class="queue-pill" title="Pending sync">0</span>
      </div>
    </div>
    <nav id="survey-tabs" class="tabs hidden">
      <button class="tab" data-screen="info">Info</button>
      <button class="tab" data-screen="slugs">Slugs</button>
      <button class="tab" data-screen="review">Review</button>
    </nav>
  </header>

  <main id="app"></main>

  <!-- Setup screen template -->
  <template id="tpl-setup">
    <section class="screen">
      <h2>New Sea Slug Survey</h2>
      <p class="muted">Enter the shared survey details. They will be attached to every slug you log.</p>
      <form id="setup-form" class="form-stack" autocomplete="off">
        <label>Number of Surveyors
          <input name="numberOfSurveyors" type="number" min="1" max="20" step="1" inputmode="numeric" required />
        </label>
        <div class="surveyor-names hidden"></div>

        <label>Date</label>
        <div class="date-row">
          <select name="dateDD" required></select>
          <select name="dateMM" required></select>
          <input name="dateYYYY" type="number" min="2000" max="2100" step="1" inputmode="numeric" placeholder="YYYY" required />
        </div>

        <label>Dive Site
          <select name="diveSite" required>
            <option value="">— Choose a site —</option>
          </select>
        </label>

        <label>Site Region
          <select name="siteRegion" required>
            <option value="">— Choose a region —</option>
          </select>
        </label>
        <label class="region-other-wrap hidden">Specify region
          <input name="siteRegionOther" type="text" maxlength="80" placeholder="Describe the region" />
        </label>

        <label>General Substrate of Survey Site
          <input name="generalSubstrate" type="text" maxlength="120" placeholder="e.g. mixed reef &amp; sand" />
        </label>

        <label>Temperature (°C)
          <input name="temperature" type="number" step="0.1" inputmode="decimal" placeholder="e.g. 29.5" required />
        </label>

        <label>Day or Night</label>
        <div class="daynight-toggle pill-group two-col"></div>

        <button type="submit" class="primary">Start logging slugs</button>
        <button type="button" id="resume-btn" class="ghost hidden">Resume saved draft</button>
      </form>
    </section>
  </template>

  <!-- Survey Info template — edit shared metadata mid-survey -->
  <template id="tpl-info">
    <section class="screen">
      <h2>Survey Info</h2>
      <p class="muted">Edit the shared details for this survey. Changes apply to all slugs in this draft and to future submissions. Slugs already pushed to the Sheet keep their original details.</p>
      <form id="info-form" class="form-stack" autocomplete="off">
        <label>Number of Surveyors
          <input name="numberOfSurveyors" type="number" min="1" max="20" step="1" inputmode="numeric" />
        </label>
        <div class="surveyor-names hidden"></div>

        <label>Date</label>
        <div class="date-row">
          <select name="dateDD"></select>
          <select name="dateMM"></select>
          <input name="dateYYYY" type="number" min="2000" max="2100" step="1" inputmode="numeric" placeholder="YYYY" />
        </div>

        <label>Dive Site
          <select name="diveSite">
            <option value="">— Choose a site —</option>
          </select>
        </label>

        <label>Site Region
          <select name="siteRegion">
            <option value="">— Choose a region —</option>
          </select>
        </label>
        <label class="region-other-wrap hidden">Specify region
          <input name="siteRegionOther" type="text" maxlength="80" placeholder="Describe the region" />
        </label>

        <label>General Substrate of Survey Site
          <input name="generalSubstrate" type="text" maxlength="120" placeholder="e.g. mixed reef &amp; sand" />
        </label>

        <label>Temperature (°C)
          <input name="temperature" type="number" step="0.1" inputmode="decimal" placeholder="e.g. 29.5" />
        </label>

        <label>Day or Night</label>
        <div class="daynight-toggle pill-group two-col"></div>
      </form>
      <p class="muted small info-saved" id="info-saved">Changes save automatically.</p>
    </section>
  </template>

  <!-- Slug list / per-slug editor template -->
  <template id="tpl-slugs">
    <section class="screen">
      <div class="screen-head">
        <h2>Slugs This Survey</h2>
        <div class="progress-pill" id="slug-count">0 slugs</div>
      </div>
      <p class="muted small">Add one entry per sea slug spotted. Tap a card to expand and edit. Each slug gets a unique Nudi no. (assigned from the Sheet on submit). Fields marked <strong>*</strong> are required before you can submit.</p>

      <div id="slug-list" class="shark-list"></div>

      <button id="add-slug" class="primary add-shark-btn">+ Add a slug</button>
    </section>
  </template>

  <!-- Review/submit template -->
  <template id="tpl-review">
    <section class="screen">
      <h2>Review &amp; Submit</h2>
      <div id="review-summary" class="review-summary"></div>

      <div class="review-actions all-actions">
        <button id="submit-all" class="primary submit-all-full">SUBMIT SURVEY</button>
        <div class="review-secondary-row">
          <button id="download-csv" class="ghost">Download CSV</button>
          <button id="copy-tsv" class="ghost">Copy as TSV</button>
          <button id="export-json" class="ghost">Export JSON</button>
        </div>
        <button id="discard-all" class="danger reset-btn">Reset All Data</button>
      </div>

      <div id="submit-result" class="submit-result"></div>
    </section>
  </template>

  <!-- Hard Coral details modal (same as EMP Uploader) -->
  <template id="tpl-hc-modal">
    <div class="modal-backdrop">
      <div class="modal hc-modal">
        <h3>Hard Coral details</h3>
        <div class="hc-field">
          <div class="hc-label">Growth Form</div>
          <div class="hc-buttons" data-group="growth"></div>
        </div>
        <div class="hc-field">
          <div class="hc-label">Health Status</div>
          <div class="hc-buttons" data-group="health"></div>
        </div>
        <div class="hc-field">
          <div class="hc-label">Genus Code</div>
          <div class="hc-genus-row">
            <select id="hc-genus-tier">
              <option value="">— Tax tier —</option>
              <option value="Tax I">Tax I</option>
              <option value="Tax II">Tax II</option>
              <option value="Tax III">Tax III</option>
            </select>
            <select id="hc-genus" disabled>
              <option value="">← Pick tier first</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button class="ghost" data-action="cancel">Cancel</button>
          <button class="primary" data-action="confirm">Confirm</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Other (OTH) substrate details modal -->
  <template id="tpl-oth-modal">
    <div class="modal-backdrop">
      <div class="modal">
        <h3>Other — please specify</h3>
        <input id="oth-text" type="text" maxlength="80" placeholder="e.g. GC" autocapitalize="characters" autocomplete="off" />
        <p class="muted small">Short code or description for the substrate the slug was found on.</p>
        <div class="modal-actions">
          <button class="ghost" data-action="cancel">Cancel</button>
          <button class="primary" data-action="confirm">Confirm</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Pending sync queue modal -->
  <template id="tpl-queue-modal">
    <div class="modal-backdrop">
      <div class="modal queue-modal">
        <h3>Pending Sync Queue</h3>
        <p class="muted small" id="queue-empty-hint">Nothing pending.</p>
        <div class="queue-list" id="queue-list"></div>
        <p class="muted small" id="queue-sync-hint"></p>
        <div class="modal-actions">
          <button class="ghost" data-action="close">Close</button>
          <button class="primary" data-action="retry" id="queue-retry-btn">Retry now</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Settings (Sheets sync URL) drawer -->
  <button id="settings-btn" class="settings-btn" title="Settings">⚙</button>
  <template id="tpl-settings">
    <div class="modal-backdrop">
      <div class="modal">
        <h3>Settings</h3>
        <label>Google Apps Script Web App URL
          <input id="sync-url" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
          <small class="muted">Leave blank to disable Sheets sync — exports still work.</small>
        </label>
        <label class="checkbox-row">
          <input type="checkbox" id="auto-sync" /> Auto-sync when online
        </label>
        <div class="modal-actions">
          <button class="ghost" data-action="cancel">Close</button>
          <button class="primary" data-action="save">Save</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Species list (auto-extracted from the Koh Tao guidebook) loads first -->
  <script src="species-data.js?v=slug-v3" defer></script>
  <!-- Version query forces a fresh app.js fetch when CACHE_VERSION bumps. -->
  <script src="app.js?v=slug-v3" defer></script>
</body>
</html>
